<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🪲 Litter Bug Splat!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#000; font-family:'Segoe UI',sans-serif;
    /* Prevent iOS bounce / text selection on long-press */
    -webkit-user-select:none; user-select:none;
    touch-action:none;
  }

  /* ── PAGE STRUCTURE ───────────────────────────────────────── */
  /* Canvas fills all space above the control panel */
  #canvas {
    display:block;
    position:fixed; top:0; left:0;
    /* width/height set by JS to match game viewport */
  }

  /* ── HUD (sits above canvas) ──────────────────────────────── */
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px;
    background:linear-gradient(180deg,rgba(0,0,0,0.88) 0%,transparent 100%);
    pointer-events:none; z-index:30;
  }
  #hud .stat { color:#fff; font-size:clamp(11px,3vw,15px); font-weight:700; text-shadow:0 0 8px #0ff; }
  #hud .stat span { color:#0ff; font-size:clamp(13px,3.5vw,18px); }
  #levelBadge {
    background:linear-gradient(135deg,#ff6b00,#ffcc00);
    color:#000; padding:3px 12px; border-radius:20px;
    font-size:clamp(12px,3vw,16px); font-weight:900;
  }

  /* ── INSTRUCTIONS (compact top-right overlay) ─────────────── */
  #instructions {
    position:fixed; top:48px; right:10px;
    background:rgba(0,0,0,0.78); color:#aaa;
    padding:7px 12px; border-radius:10px;
    font-size:clamp(9px,2vw,11px); line-height:1.65;
    z-index:30; pointer-events:none;
    border:1px solid rgba(255,255,255,0.12);
    display:grid; grid-template-columns:1fr 1fr; column-gap:14px;
    max-width:min(96vw, 460px);
  }
  #instructions .instr-title {
    grid-column:1/-1; color:#ffcc00; font-weight:700;
    font-size:clamp(10px,2.2vw,12px); margin-bottom:2px;
  }
  #instructions b { color:#ffcc00; }

  /* ── CONTROL PANEL (pinned to bottom) ────────────────────── */
  #ctrl-panel {
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(0,0,0,0.88);
    border-top:2px solid rgba(0,255,255,0.25);
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 10px;
    z-index:40;
    /* height is set dynamically by JS */
    gap:8px;
  }

  /* ── D-PAD ─────────────────────────────────────────────────── */
  #controls {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:4px;
    flex-shrink:0;
    /* size set by JS */
  }
  .dpad-btn {
    background:rgba(255,255,255,0.13);
    border:2px solid rgba(255,255,255,0.3);
    border-radius:10px; color:#fff;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
    transition:background 0.08s;
    /* font-size set by JS */
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background:rgba(0,255,255,0.32); border-color:#0ff;
  }
  #dUp    { grid-column:2; grid-row:1; }
  #dLeft  { grid-column:1; grid-row:2; }
  #dCenter{ grid-column:2; grid-row:2; }
  #dRight { grid-column:3; grid-row:2; }
  #dDown  { grid-column:2; grid-row:3; }
  #dUL    { grid-column:1; grid-row:1; }
  #dUR    { grid-column:3; grid-row:1; }
  #dDL    { grid-column:1; grid-row:3; }
  #dDR    { grid-column:3; grid-row:3; }

  /* ── CENTRE INFO STRIP ─────────────────────────────────────── */
  #centre-info {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:5px;
    min-width:0;
  }
  #carry-label {
    color:#0ff; font-size:clamp(10px,2.5vw,13px);
    font-weight:700; text-align:center; white-space:nowrap;
  }
  #miniLog {
    background:rgba(0,200,255,0.15); color:#0ff;
    padding:5px 10px; border-radius:16px;
    font-size:clamp(10px,2.2vw,12px); font-weight:600;
    text-align:center; opacity:0; transition:opacity 0.3s;
    pointer-events:none; max-width:100%; word-break:break-word;
    line-height:1.35;
  }

  /* ── ACTION BUTTONS ────────────────────────────────────────── */
  #actions {
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:repeat(3,1fr);
    gap:5px;
    flex-shrink:0;
    /* size set by JS */
  }
  .act-btn {
    border:none; border-radius:10px; cursor:pointer;
    font-weight:800; line-height:1.2;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    box-shadow:0 3px 8px rgba(0,0,0,0.4);
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    padding:4px 6px;
    /* font-size set by JS */
  }
  #btnShoot  { background:linear-gradient(135deg,#ff2244,#ff6600); color:#fff; }
  #btnSplat  { background:linear-gradient(135deg,#00cc44,#00ff99); color:#000; }
  #btnPickup { background:linear-gradient(135deg,#3399ff,#00ccff); color:#fff; }
  #btnRobots { background:linear-gradient(135deg,#aa44ff,#ff44dd); color:#fff; }
  #btnCams   { background:linear-gradient(135deg,#ff9900,#ffee00); color:#000; }
  #btnShoot  { grid-column:1; grid-row:1; }
  #btnSplat  { grid-column:2; grid-row:1; }
  #btnPickup { grid-column:1; grid-row:2; }
  #btnRobots { grid-column:2; grid-row:2; }
  #btnCams   { grid-column:1/-1; grid-row:3; }
  .act-btn:disabled { opacity:0.4; cursor:not-allowed; filter:grayscale(0.5); }

  /* ── MODAL ──────────────────────────────────────────────────── */
  #msgBox {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.93); border:2px solid #0ff;
    color:#fff; padding:24px 30px; border-radius:18px;
    text-align:center; z-index:200; display:none;
    width:min(92vw,460px);
    max-height:90vh; overflow-y:auto;
  }
  #msgBox h2   { font-size:clamp(18px,5vw,26px); color:#ffcc00; margin-bottom:10px; }
  #msgBox p    { font-size:clamp(12px,3vw,14px); line-height:1.65; color:#ccc; margin-bottom:16px; white-space:pre-line; }
  #msgBox .prize { font-size:clamp(36px,10vw,52px); margin:8px 0; }
  #msgBtn {
    background:linear-gradient(135deg,#ff6b00,#ffcc00);
    border:none; color:#000; font-size:clamp(14px,4vw,16px);
    font-weight:900; padding:10px 30px; border-radius:30px;
    cursor:pointer; pointer-events:all;
  }
  #msgBtn:hover { filter:brightness(1.15); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="stat">⭐ <span id="score">0</span></div>
  <div id="levelBadge">LEVEL <span id="lvlNum">1</span></div>
  <div class="stat">🪲 <span id="bugsLeft">0</span> &nbsp;🗑️ <span id="litterCount">0</span> &nbsp;📷 <span id="camCount">0</span></div>
</div>

<!-- Instructions -->
<div id="instructions">
  <div class="instr-title">📋 HOW TO PLAY</div>
  <div>🗑️ Walk to litter → <b>PICK UP</b></div>
  <div>🪲 Carry litter + close → <b>SPLAT</b></div>
  <div>🎫 Face bug → <b>SHOOT TICKET</b></div>
  <div>🤖 <b>ROBOTS</b> collect litter fast</div>
  <div>📷 <b>AI CAMS</b> auto-shoot bugs</div>
  <div>🚶 Don't hit <b>pedestrians</b> (−30pts!)</div>
  <div style="grid-column:1/-1">🏆 Clear <b>ALL bugs</b> AND <b>ALL litter</b> to complete!</div>
</div>

<!-- Control Panel -->
<div id="ctrl-panel">

  <!-- D-Pad -->
  <div id="controls">
    <button class="dpad-btn" id="dUL">↖</button>
    <button class="dpad-btn" id="dUp">▲</button>
    <button class="dpad-btn" id="dUR">↗</button>
    <button class="dpad-btn" id="dLeft">◀</button>
    <button class="dpad-btn" id="dCenter">•</button>
    <button class="dpad-btn" id="dRight">▶</button>
    <button class="dpad-btn" id="dDL">↙</button>
    <button class="dpad-btn" id="dDown">▼</button>
    <button class="dpad-btn" id="dDR">↘</button>
  </div>

  <!-- Centre info -->
  <div id="centre-info">
    <div id="carry-label">🗑️ Carrying: <span id="carryCount">0</span></div>
    <div id="miniLog"></div>
  </div>

  <!-- Action buttons -->
  <div id="actions">
    <button class="act-btn" id="btnShoot">🎫<br>SHOOT</button>
    <button class="act-btn" id="btnSplat">🪲<br>SPLAT</button>
    <button class="act-btn" id="btnPickup">🗑️<br>PICK UP</button>
    <button class="act-btn" id="btnRobots">🤖<br>ROBOTS</button>
    <button class="act-btn" id="btnCams">📷 DEPLOY AI CAMS</button>
  </div>

</div>

<!-- Modal -->
<div id="msgBox">
  <h2 id="msgTitle"></h2>
  <div class="prize" id="msgPrize"></div>
  <p id="msgBody"></p>
  <button id="msgBtn" onclick="nextAction()">Continue</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// LAYOUT MANAGER — sizes everything based on screen dimensions
// ============================================================
const PANEL_HEIGHT_PORTRAIT  = Math.round(Math.min(window.screen.height, window.innerHeight) * 0.32);
const PANEL_HEIGHT_LANDSCAPE = Math.round(Math.min(window.screen.height, window.innerHeight) * 0.42);

function isMobile() {
  return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;
}

function getPanelHeight() {
  const landscape = window.innerWidth > window.innerHeight;
  if (isMobile()) {
    return landscape ? Math.max(160, Math.round(window.innerHeight * 0.42))
                     : Math.max(200, Math.round(window.innerHeight * 0.32));
  }
  // Desktop: smaller fixed panel
  return 180;
}

function applyLayout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const panelH = getPanelHeight();
  const gameH  = vh - panelH;

  // Canvas occupies top portion only
  canvas.style.width  = vw + 'px';
  canvas.style.height = gameH + 'px';

  // Resize renderer + camera
  W = vw; H = gameH;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();

  // Panel height
  const panel = document.getElementById('ctrl-panel');
  panel.style.height = panelH + 'px';

  // D-pad: square, fits panel height with padding
  const dpadSize = Math.min(panelH - 16, Math.round(vw * 0.38), 220);
  const cellSize = Math.floor((dpadSize - 8) / 3); // 3 cols, 4px gap×2
  const dpad = document.getElementById('controls');
  dpad.style.width  = dpadSize + 'px';
  dpad.style.height = dpadSize + 'px';
  dpad.style.gridTemplateColumns = `repeat(3,${cellSize}px)`;
  dpad.style.gridTemplateRows    = `repeat(3,${cellSize}px)`;
  const dpadFontMain = Math.max(16, Math.round(cellSize * 0.48)) + 'px';
  const dpadFontDiag = Math.max(13, Math.round(cellSize * 0.38)) + 'px';
  document.querySelectorAll('.dpad-btn').forEach(b => {
    b.style.fontSize = dpadFontMain;
  });
  ['dUL','dUR','dDL','dDR'].forEach(id => {
    document.getElementById(id).style.fontSize = dpadFontDiag;
  });
  document.getElementById('dCenter').style.fontSize = Math.max(11, Math.round(cellSize * 0.28)) + 'px';

  // Action buttons grid: fills remaining width after dpad + centre-info
  // We give it the same height as the panel
  const actionAreaW = Math.min(Math.round(vw * 0.40), 260);
  const actionAreaH = dpadSize;
  const actions = document.getElementById('actions');
  actions.style.width  = actionAreaW + 'px';
  actions.style.height = actionAreaH + 'px';
  const btnFontSize = Math.max(10, Math.round(Math.min(actionAreaW, actionAreaH) * 0.1)) + 'px';
  document.querySelectorAll('.act-btn').forEach(b => {
    b.style.fontSize = btnFontSize;
  });
}

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('canvas');
let W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 30, 80);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 200);
camera.position.set(0, 12, 14);
camera.lookAt(0, 0, 0);

// Apply layout on load and resize
applyLayout();
window.addEventListener('resize', applyLayout);

// ============================================================
// LEVEL DEFINITIONS
// ============================================================
const LEVELS = [
  { bugs:2,  pedestrians:1,  bugSpeed:0.018, litterRate:220, arenaSize:20, ticketSpeed:0.25, robotsAllowed:2, camsAllowed:1 },
  { bugs:3,  pedestrians:2,  bugSpeed:0.024, litterRate:190, arenaSize:22, ticketSpeed:0.28, robotsAllowed:2, camsAllowed:1 },
  { bugs:4,  pedestrians:3,  bugSpeed:0.030, litterRate:165, arenaSize:24, ticketSpeed:0.30, robotsAllowed:3, camsAllowed:2 },
  { bugs:5,  pedestrians:3,  bugSpeed:0.036, litterRate:145, arenaSize:26, ticketSpeed:0.32, robotsAllowed:3, camsAllowed:2 },
  { bugs:6,  pedestrians:4,  bugSpeed:0.044, litterRate:120, arenaSize:28, ticketSpeed:0.34, robotsAllowed:3, camsAllowed:2 },
  { bugs:7,  pedestrians:5,  bugSpeed:0.052, litterRate:100, arenaSize:28, ticketSpeed:0.36, robotsAllowed:4, camsAllowed:3 },
  { bugs:8,  pedestrians:6,  bugSpeed:0.060, litterRate:85,  arenaSize:30, ticketSpeed:0.38, robotsAllowed:4, camsAllowed:3 },
  { bugs:10, pedestrians:7,  bugSpeed:0.070, litterRate:70,  arenaSize:30, ticketSpeed:0.40, robotsAllowed:5, camsAllowed:4 },
  { bugs:12, pedestrians:8,  bugSpeed:0.082, litterRate:55,  arenaSize:32, ticketSpeed:0.42, robotsAllowed:5, camsAllowed:4 },
  { bugs:15, pedestrians:10, bugSpeed:0.096, litterRate:40,  arenaSize:34, ticketSpeed:0.44, robotsAllowed:6, camsAllowed:5 },
];

const PRIZES = [
  { emoji:'🥉', name:'Bronze Litter-Picker Badge',      desc:'You cleaned up your first area. The park benches look happy!' },
  { emoji:'🌟', name:'Silver Shine Award',               desc:'The pigeons are confused by how clean it is!' },
  { emoji:'🎖️', name:'Eco Warrior Medal',               desc:'Three cheers for the environment!' },
  { emoji:'🌿', name:'Green Guardian Trophy',            desc:'Plants are literally growing faster because of you.' },
  { emoji:'🦸', name:'Captain Clean Cape',               desc:'Half way there! Citizens cheer your name!' },
  { emoji:'🏅', name:'Gold Anti-Litter Shield',          desc:'You are a legend among park-keepers!' },
  { emoji:'🌍', name:'Earth Protector Crown',            desc:'The Earth sends its thanks (via its lawyers).' },
  { emoji:'⚡', name:'Turbo Ticket Master Badge',        desc:'Your ticket aim is feared throughout the land!' },
  { emoji:'💎', name:'Diamond Dustbin Trophy',           desc:'One more level stands between you and glory!' },
  { emoji:'🏆', name:'ULTIMATE LITTER SPLAT CHAMPION!',  desc:'You have defeated ALL the litter bugs and cleared every last scrap! The world is spotless. A parade was organised. Congratulations!' },
];

// ============================================================
// GAME STATE
// ============================================================
let currentLevel = 0;
let score = 0;
let carrying = 0;
let bugs = [];
let pedestrians = [];
let litters = [];
let tickets = [];
let camTickets = [];
let explosions = [];
let robots = [];
let aiCams = [];
let levelComplete = false;
let gameOver = false;
let msgAction = null;
let arenaSize = 20;
let robotsDeployed = 0;
let camsDeployed = 0;

const keys = {};
const dpadState = {};

let player;
let playerSpeed = 0.09;
let playerAngle = 0;

// ============================================================
// LIGHTING
// ============================================================
const ambLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambLight);
const sunLight = new THREE.DirectionalLight(0xffffcc, 1.0);
sunLight.position.set(20, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048; sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;  sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -50;  sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 50;    sunLight.shadow.camera.bottom = -50;
scene.add(sunLight);

// ============================================================
// GEOMETRY HELPERS
// ============================================================
function makeCylinder(rt, rb, h, segs, color, emissive) {
  const g = new THREE.CylinderGeometry(rt, rb, h, segs);
  const m = new THREE.MeshLambertMaterial({ color });
  if (emissive) m.emissive = new THREE.Color(emissive);
  return new THREE.Mesh(g, m);
}
function makeBox(w, h, d, color, emissive) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.MeshLambertMaterial({ color });
  if (emissive) m.emissive = new THREE.Color(emissive);
  return new THREE.Mesh(g, m);
}
function makeSphere(r, segs, color, emissive) {
  const g = new THREE.SphereGeometry(r, segs, segs);
  const m = new THREE.MeshLambertMaterial({ color });
  if (emissive) m.emissive = new THREE.Color(emissive);
  return new THREE.Mesh(g, m);
}

// ============================================================
// BUILD ARENA
// ============================================================
let arenaGroup;
function buildArena(size) {
  if (arenaGroup) scene.remove(arenaGroup);
  arenaGroup = new THREE.Group();

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(size*2+4, size*2+4, 20, 20),
    new THREE.MeshLambertMaterial({ color: 0x4a7c3f })
  );
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; arenaGroup.add(ground);

  const path = new THREE.Mesh(
    new THREE.PlaneGeometry(size*1.6, size*1.6),
    new THREE.MeshLambertMaterial({ color: 0x8a7a60 })
  );
  path.rotation.x = -Math.PI/2; path.position.y = 0.01; arenaGroup.add(path);

  const hedgeMat = new THREE.MeshLambertMaterial({ color: 0x2d5a1b });
  for (let i = -size; i <= size; i += 4) {
    const t = new THREE.Mesh(new THREE.BoxGeometry(4.1,2,1.5), hedgeMat);
    t.position.set(i,1,-size); t.castShadow=true; arenaGroup.add(t);
    const b = t.clone(); b.position.set(i,1,size); arenaGroup.add(b);
    const l = new THREE.Mesh(new THREE.BoxGeometry(1.5,2,4.1), hedgeMat);
    l.position.set(-size,1,i); l.castShadow=true; arenaGroup.add(l);
    const r = l.clone(); r.position.set(size,1,i); arenaGroup.add(r);
  }

  const tcount = Math.floor(size/3);
  for (let i=0; i<tcount; i++) {
    const angle = (i/tcount)*Math.PI*2;
    const dist  = size*0.72 + (Math.random()-0.5)*4;
    const tx = Math.cos(angle)*dist, tz = Math.sin(angle)*dist;
    const trunk = makeCylinder(0.2,0.3,2,6,0x5c3d1e);
    trunk.position.set(tx,1,tz); trunk.castShadow=true; arenaGroup.add(trunk);
    const foliage = makeSphere(1.3+Math.random()*0.5,7,0x228B22);
    foliage.position.set(tx,2.8+Math.random(),tz); foliage.castShadow=true; arenaGroup.add(foliage);
  }

  for (let i=0; i<4; i++) {
    const a = (i/4)*Math.PI*2;
    const bx = Math.cos(a)*size*0.5, bz = Math.sin(a)*size*0.5;
    const bench = makeBox(2,0.15,0.6,0x8B5E3C);
    bench.position.set(bx,0.4,bz); bench.rotation.y=a; arenaGroup.add(bench);
    const leg1 = makeBox(0.15,0.4,0.6,0x5c3d1e);
    leg1.position.set(bx-0.7*Math.cos(a),0.2,bz-0.7*Math.sin(a)); arenaGroup.add(leg1);
    const leg2 = leg1.clone();
    leg2.position.set(bx+0.7*Math.cos(a),0.2,bz+0.7*Math.sin(a)); arenaGroup.add(leg2);
  }

  const bin = makeCylinder(0.3,0.25,0.8,8,0x333333);
  bin.position.set(size*0.3,0.4,0); arenaGroup.add(bin);

  scene.add(arenaGroup);
}

// ============================================================
// PLAYER
// ============================================================
function createPlayer() {
  const group = new THREE.Group();
  const body = makeCylinder(0.3,0.35,1.0,8,0x2244cc); body.position.y=0.5; group.add(body);
  const head = makeSphere(0.35,8,0xffccaa); head.position.y=1.35; group.add(head);
  const hatBrim = makeCylinder(0.5,0.5,0.08,10,0x222222); hatBrim.position.y=1.65; group.add(hatBrim);
  const hatTop  = makeCylinder(0.3,0.3,0.4,10,0x222222); hatTop.position.y=1.85; group.add(hatTop);
  const badge = makeBox(0.2,0.15,0.05,0xffdd00); badge.position.set(0,0.75,0.36); group.add(badge);
  const armL = makeCylinder(0.1,0.1,0.6,5,0x2244cc); armL.rotation.z=Math.PI/4; armL.position.set(-0.5,0.7,0); group.add(armL);
  const armR = armL.clone(); armR.rotation.z=-Math.PI/4; armR.position.set(0.5,0.7,0); group.add(armR);
  const legL = makeCylinder(0.12,0.12,0.7,5,0x111166); legL.position.set(-0.18,0,0); group.add(legL);
  const legR = legL.clone(); legR.position.set(0.18,0,0); group.add(legR);
  group.castShadow=true; scene.add(group); return group;
}

// ============================================================
// BUG
// ============================================================
function createBug(x, z, speed) {
  const group = new THREE.Group();
  const body = makeCylinder(0.35,0.35,0.25,10,0x33cc00);
  body.rotation.x=Math.PI/2; body.position.y=0.3; group.add(body);
  const head = makeSphere(0.25,7,0x22aa00,0x003300); head.position.set(0,0.3,0.4); group.add(head);

  }

// ============================================================
// LITTER
// ============================================================
const LITTER_GEOS = [
  new THREE.BoxGeometry(0.2,0.08,0.12),
  new THREE.SphereGeometry(0.1,5,5),
  new THREE.BoxGeometry(0.18,0.02,0.24),
  new THREE.CylinderGeometry(0.07,0.07,0.22,6),
];
const LITTER_COLS = [0xff4444, 0xffd700, 0xffffff, 0x33aaff];
function dropLitter(x, z) {
  const ti = Math.floor(Math.random()*4);
  const mesh = new THREE.Mesh(LITTER_GEOS[ti], new THREE.MeshLambertMaterial({color:LITTER_COLS[ti]}));
  mesh.position.set(x+(Math.random()-0.5)*0.4, 0.05, z+(Math.random()-0.5)*0.4);
  mesh.rotation.y = Math.random()*Math.PI*2;
  scene.add(mesh);
  litters.push({ mesh, x:mesh.position.x, z:mesh.position.z });
}

// ============================================================
// TICKET PROJECTILE
// ============================================================
function makeTicketMesh(color, emissive) {
  const g = new THREE.BoxGeometry(0.3,0.02,0.2);
  const m = new THREE.MeshLambertMaterial({ color:color||0xffff88, emissive:new THREE.Color(emissive||0xaaaa00) });
  const mesh = new THREE.Mesh(g,m);
  scene.add(mesh); return mesh;
}
function shootTicket(fromX, fromZ, dx, dz, speed) {
  const mesh = makeTicketMesh();
  mesh.position.set(fromX, 1.0, fromZ);
  tickets.push({ mesh, dx, dz, speed, alive:true });
}

// ============================================================
// EXPLOSION
// ============================================================
function spawnExplosion(x, z, color) {
  for (let i=0; i<10; i++) {
    const s = makeSphere(0.12+Math.random()*0.1, 5, color);
    s.position.set(x+(Math.random()-0.5)*0.5, 0.5+Math.random(), z+(Math.random()-0.5)*0.5);

}

// ============================================================
// LEVEL INIT
// ============================================================
function initLevel(lvlIdx) {
  bugs.forEach(b=>{if(b.mesh)scene.remove(b.mesh)});
  pedestrians.forEach(p=>{if(p.mesh)scene.remove(p.mesh)});
  litters.forEach(l=>{if(l.mesh)scene.remove(l.mesh)});
  tickets.forEach(t=>{if(t.mesh)scene.remove(t.mesh)});
  camTickets.forEach(t=>{if(t.mesh)scene.remove(t.mesh)});
  explosions.forEach(e=>{if(e.mesh)scene.remove(e.mesh)});
  robots.forEach(r=>{if(r.mesh)scene.remove(r.mesh)});
  aiCams.forEach(c=>{if(c.mesh)scene.remove(c.mesh)});
  bugs=[]; pedestrians=[]; litters=[]; tickets=[]; camTickets=[];
  explosions=[]; robots=[]; aiCams=[];
  carrying=0; levelComplete=false; robotsDeployed=0; camsDeployed=0;

  const cfg = LEVELS[lvlIdx];
  arenaSize=cfg.arenaSize;
  buildArena(arenaSize);

  if(player) scene.remove(player);
  player=createPlayer(); player.position.set(0,0,0); playerAngle=0;

  for(let i=0;i<cfg.bugs;i++){
    const angle=(i/cfg.bugs)*Math.PI*2;
    const r=arenaSize*0.4+Math.random()*arenaSize*0.2;
    bugs.push(createBug(Math.cos(angle)*r, Math.sin(angle)*r, cfg.bugSpeed));
  }
  for(let i=0;i<cfg.pedestrians;i++){
    const angle=Math.random()*Math.PI*2;
    const r=arenaSize*0.2+Math.random()*arenaSize*0.35;
    pedestrians.push(createPedestrian(Math.cos(angle)*r, Math.sin(angle)*r));
  }

  updateHUD();
  updateActionButtons();
  document.getElementById('carryCount').textContent='0';
}

function updateHUD() {
  document.getElementById('score').textContent=score;
  document.getElementById('bugsLeft').textContent=bugs.filter(b=>b.alive).length;
  document.getElementById('litterCount').textContent=litters.length;
  document.getElementById('camCount').textContent=aiCams.filter(c=>c.alive).length;
  document.getElementById('lvlNum').textContent=currentLevel+1;
}

function updateActionButtons() {
  const cfg=LEVELS[currentLevel];
  const rBtn=document.getElementById('btnRobots');
  const cBtn=document.getElementById('btnCams');
  rBtn.disabled=robotsDeployed>=cfg.robotsAllowed||levelComplete;
  rBtn.innerHTML=`🤖<br>ROBOTS<br><span style="font-size:0.75em;opacity:0.8">${robotsDeployed}/${cfg.robotsAllowed}</span>`;
  cBtn.disabled=camsDeployed>=cfg.camsAllowed||levelComplete;
  cBtn.textContent=`📷 AI CAMS (${camsDeployed}/${cfg.camsAllowed})`;
}

// ============================================================
// INPUT
// ============================================================
const dpadMap = {
  dUp:[0,-1], dDown:[0,1], dLeft:[-1,0], dRight:[1,0],
  dUL:[-0.707,-0.707], dUR:[0.707,-0.707], dDL:[-0.707,0.707], dDR:[0.707,0.707],
};
Object.keys(dpadMap).forEach(id=>{
  const btn=document.getElementById(id);
  btn.addEventListener('pointerdown',e=>{e.preventDefault();dpadState[id]=true;btn.classList.add('pressed');});
  btn.addEventListener('pointerup',  e=>{e.preventDefault();dpadState[id]=false;btn.classList.remove('pressed');});
  btn.addEventListener('pointerleave',e=>{dpadState[id]=false;btn.classList.remove('pressed');});
  btn.addEventListener('pointercancel',e=>{dpadState[id]=false;btn.classList.remove('pressed');});
});
document.addEventListener('keydown',e=>{keys[e.code]=true;});
document.addEventListener('keyup',  e=>{keys[e.code]=false;});

document.getElementById('btnShoot').addEventListener('pointerdown', e=>{e.preventDefault();actionShoot();});
document.getElementById('btnSplat').addEventListener('pointerdown', e=>{e.preventDefault();actionSplat();});
document.getElementById('btnPickup').addEventListener('pointerdown',e=>{e.preventDefault();actionPickup();});
document.getElementById('btnRobots').addEventListener('pointerdown',e=>{e.preventDefault();actionDeployRobots();});
document.getElementById('btnCams').addEventListener('pointerdown',  e=>{e.preventDefault();actionDeployCams();});

document.addEventListener('keydown',e=>{
  if(e.code==='Space') actionShoot();
  if(e.code==='KeyE')  actionSplat();
  if(e.code==='KeyQ')  actionPickup();
  if(e.code==='KeyR')  actionDeployRobots();
  if(e.code==='KeyF')  actionDeployCams();
});

function getInputDir() {
  let dx=0, dz=0;
  if(keys['ArrowUp']  ||keys['KeyW']) dz-=1;
  if(keys['ArrowDown']||keys['KeyS']) dz+=1;
  if(keys['ArrowLeft']||keys['KeyA']) dx-=1;
  if(keys['ArrowRight']||keys['KeyD'])dx+=1;
  Object.keys(dpadMap).forEach(id=>{
    if(dpadState[id]){dx+=dpadMap[id][0];dz+=dpadMap[id][1];}
  });
  const len=Math.sqrt(dx*dx+dz*dz);
  if(len>0){dx/=len;dz/=len;}
  return [dx,dz];
}

// ============================================================
// PLAYER ACTIONS
// ============================================================
function actionPickup() {
  if(levelComplete||gameOver) return;
  const px=player.position.x, pz=player.position.z;
  let picked=0;
  litters=litters.filter(l=>{
    const d=Math.sqrt((l.x-px)**2+(l.z-pz)**2);
    if(d<1.5){scene.remove(l.mesh);picked++;return false;}
    return true;
  });
  if(picked>0){
    carrying+=picked; score+=picked*2;
    document.getElementById('carryCount').textContent=carrying;
    showLog(`✅ Picked up ${picked} piece${picked>1?'s':''}! +${picked*2}pts`);
    updateHUD(); checkLevelComplete();
  } else {
    showLog('No litter nearby — walk closer first!');
  }
}

function actionSplat() {
  if(levelComplete||gameOver) return;
  if(carrying===0){showLog('⚠️ Pick up litter first, then SPLAT!');return;}
  const px=player.position.x, pz=player.position.z;
  let hit=false;
  bugs.forEach(bug=>{
    if(!bug.alive||hit) return;
    const d=Math.sqrt((bug.mesh.position.x-px)**2+(bug.mesh.position.z-pz)**2);
    if(d<2.0){
      hit=true; bug.alive=false;
      spawnExplosion(bug.mesh.position.x,bug.mesh.position.z,0x33ff00);
      scene.remove(bug.mesh);
      carrying=Math.max(0,carrying-1); score+=15;
      document.getElementById('carryCount').textContent=carrying;
      showLog('🪲 SPLAT! Bug ticketed in person! +15pts');
      updateHUD(); checkLevelComplete();
    }
  });
  if(!hit) showLog('No bug close enough — move nearer!');
}

function actionShoot() {
  if(levelComplete||gameOver) return;
  const cfg=LEVELS[currentLevel];
  const dx=Math.sin(playerAngle), dz=Math.cos(playerAngle);
  shootTicket(player.position.x, player.position.z, dx, dz, cfg.ticketSpeed);
  showLog('🎫 Ticket fired!');
}

// ============================================================
// DEPLOY ROBOTS
// ============================================================
function actionDeployRobots() {
  if(levelComplete||gameOver) return;
  const cfg=LEVELS[currentLevel];
  if(robotsDeployed>=cfg.robotsAllowed){showLog(`🤖 Robot limit reached (${cfg.robotsAllowed})!`);return;}
  if(litters.length===0){showLog('🤖 No litter to collect right now!');return;}
  const squadSize=3;
  for(let i=0;i<squadSize;i++){
    const angle=(i/squadSize)*Math.PI*2;
    robots.push(createRobotSpider(
      player.position.x+Math.cos(angle)*1.5,
      player.position.z+Math.sin(angle)*1.5
    ));
  }
  robotsDeployed++;
  score=Math.max(0,score-5);
  showLog(`🤖 Robot squad deployed! (−5pts)`);
  updateHUD(); updateActionButtons();
}

// ============================================================
// DEPLOY AI CAMERAS
// ============================================================
function actionDeployCams() {
  if(levelComplete||gameOver) return;
  const cfg=LEVELS[currentLevel];
  if(camsDeployed>=cfg.camsAllowed){showLog(`📷 Camera limit reached (${cfg.camsAllowed})!`);return;}
  aiCams.push(createAICam(player.position.x, player.position.z));
  camsDeployed++;
  score=Math.max(0,score-3);
  showLog(`📷 AI Camera deployed! Auto-shoots bugs! (−3pts)`);
  updateHUD(); updateActionButtons();
}

// ============================================================
// CHECK LEVEL COMPLETE
// ============================================================
function checkLevelComplete() {
  const bugsGone   = bugs.filter(b=>b.alive).length===0;
  const litterGone = litters.length===0;
  if(bugsGone && litterGone && !levelComplete) {
    levelComplete=true;
    const p=PRIZES[currentLevel];
    setTimeout(()=>{
      showModal(
        currentLevel===9 ? '🏆 YOU WIN THE GAME!' : `✅ Level ${currentLevel+1} Complete!`,
        p.emoji,
        `You earned: ${p.name}\n\n${p.desc}\n\nScore: ${score} pts`,
        currentLevel===9 ? '🎉 Play Again!' : `➡️ Level ${currentLevel+2}`,
        ()=>{
          if(currentLevel===9){score=0;currentLevel=0;}
          else currentLevel++;
          initLevel(currentLevel);
        }
      );
    },800);
  } else if(bugsGone && !litterGone && !levelComplete) {
    showLog('🪲 All bugs done! Clear the litter too! 🗑️');
  } else if(!bugsGone && litterGone && !levelComplete) {
    showLog('🗑️ Litter cleared! Now get the bugs! 🪲');
  }
}

// ============================================================
// UPDATE BUGS
// ============================================================
function updateBugs(cfg) {
  bugs.forEach(bug=>{
    if(!bug.alive) return;
    bug.turnTimer++;
    if(bug.turnTimer>bug.turnInterval){bug.angle=Math.random()*Math.PI*2;bug.turnTimer=0;bug.turnInterval=60+Math.random()*120;}
    const dx=Math.sin(bug.angle)*bug.speed, dz=Math.cos(bug.angle)*bug.speed;
    const nx=bug.mesh.position.x+dx, nz=bug.mesh.position.z+dz;
    const bound=arenaSize-1.5;
    if(Math.abs(nx)<bound&&Math.abs(nz)<bound){bug.mesh.position.x=nx;bug.mesh.position.z=nz;}
    else{bug.angle+=Math.PI+Math.random()-0.5;}
    bug.mesh.rotation.y=bug.angle;
    bug.litterTimer++;
    if(bug.litterTimer>cfg.litterRate){bug.litterTimer=0;dropLitter(bug.mesh.position.x,bug.mesh.position.z);updateHUD();}
    bug.mesh.children.forEach((c,i)=>{if(i>7)c.rotation.x=Math.sin(Date.now()*0.01+i)*0.3;});
  });
}

// ============================================================
// UPDATE PEDESTRIANS
// ============================================================
function updatePedestrians() {
  pedestrians.forEach(ped=>{
    if(!ped.alive) return;
    ped.turnTimer++;
    if(ped.turnTimer>ped.turnInterval){ped.angle+=(Math.random()-0.5)*Math.PI;ped.turnTimer=0;ped.turnInterval=60+Math.random()*100;}
    const dx=Math.sin(ped.angle)*ped.speed, dz=Math.cos(ped.angle)*ped.speed;
    const nx=ped.mesh.position.x+dx, nz=ped.mesh.position.z+dz;
    const bound=arenaSize-2;
    if(Math.abs(nx)<bound&&Math.abs(nz)<bound){ped.mesh.position.x=nx;ped.mesh.position.z=nz;}
    else{ped.angle+=Math.PI;}
    ped.mesh.rotation.y=ped.angle;
    ped.mesh.position.y=Math.sin(Date.now()*0.008+ped.angle)*0.05;
  });
}

// ============================================================
// UPDATE PLAYER TICKETS
// ============================================================
function updateTickets() {
  tickets=tickets.filter(t=>{
    if(!t.alive){scene.remove(t.mesh);return false;}
    t.mesh.position.x+=t.dx*t.speed;
    t.mesh.position.z+=t.dz*t.speed;
    t.mesh.rotation.y+=0.2;
    if(Math.abs(t.mesh.position.x)>arenaSize||Math.abs(t.mesh.position.z)>arenaSize){scene.remove(t.mesh);return false;}
    const tx=t.mesh.position.x, tz=t.mesh.position.z;
    let hitSomething=false;
    bugs.forEach(bug=>{
      if(!bug.alive||hitSomething) return;
      const d=Math.sqrt((bug.mesh.position.x-tx)**2+(bug.mesh.position.z-tz)**2);
      if(d<1.0){
        bug.alive=false; scene.remove(bug.mesh);
        spawnExplosion(bug.mesh.position.x,bug.mesh.position.z,0xffff00);
        score+=10; t.alive=false; scene.remove(t.mesh); hitSomething=true;
        showLog('🎫 Bug hit with ticket! +10pts'); updateHUD(); checkLevelComplete();
      }
    });
    if(!hitSomething){
      pedestrians.forEach(ped=>{
        if(!ped.alive||hitSomething) return;
        const d=Math.sqrt((ped.mesh.position.x-tx)**2+(ped.mesh.position.z-tz)**2);
        if(d<0.9){
          ped.alive=false; scene.remove(ped.mesh);
          spawnExplosion(ped.mesh.position.x,ped.mesh.position.z,0xff4444);
          score=Math.max(0,score-30); t.alive=false; scene.remove(t.mesh); hitSomething=true;
          showLog('❌ HIT PEDESTRIAN! −30pts! Innocent!'); updateHUD();
        }
      });
    }
    return t.alive;
  });
}

// ============================================================
// UPDATE ROBOTS
// ============================================================
function updateRobots() {
  robots.forEach(robot=>{
    if(!robot.alive) return;
    robot.legPhase+=0.18;
    robot.mesh.children.forEach((c,i)=>{if(i>4)c.rotation.x=Math.sin(robot.legPhase+i)*0.4;});
    robot.mesh.position.y=Math.abs(Math.sin(robot.legPhase))*0.06;

    if(robot.state==='seeking'){
      if(!robot.targetLitter||!litters.includes(robot.targetLitter)){
        const claimed=robots.filter(r=>r!==robot&&r.targetLitter).map(r=>r.targetLitter);
        let nearest=null, bestD=9999;
        litters.forEach(l=>{
          if(claimed.includes(l)) return;
          const d=Math.sqrt((l.x-robot.mesh.position.x)**2+(l.z-robot.mesh.position.z)**2);
          if(d<bestD){bestD=d;nearest=l;}
        });
        robot.targetLitter=nearest;
      }
      if(robot.targetLitter){
        const tx=robot.targetLitter.x, tz=robot.targetLitter.z;
        const dx=tx-robot.mesh.position.x, dz=tz-robot.mesh.position.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist<0.4){
          scene.remove(robot.targetLitter.mesh);
          const idx=litters.indexOf(robot.targetLitter);
          if(idx>-1)litters.splice(idx,1);
          robot.collected++; robot.targetLitter=null; updateHUD();
          if(robot.collected>=robot.maxCollect||litters.length===0)robot.state='returning';
          checkLevelComplete();
        } else {
          robot.mesh.position.x+=(dx/dist)*robot.speed;
          robot.mesh.position.z+=(dz/dist)*robot.speed;
          robot.mesh.rotation.y=Math.atan2(dx,dz);
        }
      } else { robot.state='returning'; }
    } else if(robot.state==='returning'){
      const dx=0-robot.mesh.position.x, dz=0-robot.mesh.position.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<1.5){
        robot.state='done'; score+=robot.collected*3;
        showLog(`🤖 Robot returned! +${robot.collected*3} bonus pts`);
        scene.remove(robot.mesh); robot.alive=false; updateHUD();
      } else {
        robot.mesh.position.x+=(dx/dist)*robot.speed;
        robot.mesh.position.z+=(dz/dist)*robot.speed;
        robot.mesh.rotation.y=Math.atan2(dx,dz);
      }
    }
  });
}

// ============================================================
// UPDATE AI CAMERAS
// ============================================================
function updateAICams(cfg) {
  const CAM_RANGE=14;
  aiCams.forEach(cam=>{
    if(!cam.alive) return;
    cam.scanAngle+=0.012; cam.mesh.rotation.y=cam.scanAngle;
    cam.shootTimer++;
    if(cam.shootTimer<cam.shootInterval) return;
    cam.shootTimer=0; cam.shootInterval=90+Math.floor(Math.random()*60);
    let nearest=null, bestD=CAM_RANGE;
    bugs.forEach(bug=>{
      if(!bug.alive) return;
      const d=Math.sqrt((bug.mesh.position.x-cam.x)**2+(bug.mesh.position.z-cam.z)**2);
      if(d<bestD){bestD=d;nearest=bug;}
    });
    if(nearest){
      const dx=nearest.mesh.position.x-cam.x, dz=nearest.mesh.position.z-cam.z;
      const len=Math.sqrt(dx*dx+dz*dz);
      const ndx=dx/len, ndz=dz/len;
      cam.mesh.rotation.y=Math.atan2(ndx,ndz);
      const tmesh=makeTicketMesh(0xff9900,0x884400);
      tmesh.position.set(cam.x,2.4,cam.z);
      camTickets.push({mesh:tmesh,dx:ndx,dz:ndz,speed:cfg.ticketSpeed*0.9,alive:true});
      const led=cam.mesh.children[3];
      if(led&&led.material){led.material.emissive.set(0xff0000);setTimeout(()=>{if(led.material)led.material.emissive.set(0x00ff00);},120);}
    }
  });
  camTickets=camTickets.filter(t=>{
    if(!t.alive){scene.remove(t.mesh);return false;}
    t.mesh.position.x+=t.dx*t.speed; t.mesh.position.z+=t.dz*t.speed; t.mesh.rotation.y+=0.25;
    if(Math.abs(t.mesh.position.x)>arenaSize||Math.abs(t.mesh.position.z)>arenaSize){scene.remove(t.mesh);return false;}
    const tx=t.mesh.position.x, tz=t.mesh.position.z;
    let hit=false;
    bugs.forEach(bug=>{
      if(!bug.alive||hit) return;
      const d=Math.sqrt((bug.mesh.position.x-tx)**2+(bug.mesh.position.z-tz)**2);
      if(d<1.0){
        bug.alive=false; scene.remove(bug.mesh);
        spawnExplosion(bug.mesh.position.x,bug.mesh.position.z,0xff9900);
        score+=8; t.alive=false; scene.remove(t.mesh); hit=true;
        showLog('📷 AI Cam got a bug! +8pts'); updateHUD(); checkLevelComplete();
      }
    });
    return t.alive;
  });
}

// ============================================================
// UPDATE EXPLOSIONS
// ============================================================
function updateExplosions() {
  explosions=explosions.filter(e=>{
    e.life--;
    e.mesh.position.x+=e.vx; e.mesh.position.y+=e.vy; e.mesh.position.z+=e.vz; e.vy-=0.003;
    const s=e.life/30; e.mesh.scale.set(s,s,s);
    if(e.life<=0){scene.remove(e.mesh);return false;}
    return true;
  });
}

// ============================================================
// MAIN LOOP
// ============================================================
let frameCount=0;
function loop() {
  requestAnimationFrame(loop);
  frameCount++;
  if(levelComplete||gameOver){renderer.render(scene,camera);return;}
  const cfg=LEVELS[currentLevel];

  const [idx,idz]=getInputDir();
  if(idx!==0||idz!==0){
    playerAngle=Math.atan2(idx,idz);
    const nx=player.position.x+idx*playerSpeed;
    const nz=player.position.z+idz*playerSpeed;
    const bound=arenaSize-1.2;
    player.position.x=Math.max(-bound,Math.min(bound,nx));
    player.position.z=Math.max(-bound,Math.min(bound,nz));
    player.rotation.y=playerAngle;
    player.position.y=Math.sin(frameCount*0.2)*0.04;
  }

  camera.position.x=player.position.x;
  camera.position.z=player.position.z+14;
  camera.position.y=12;
  camera.lookAt(player.position.x,0,player.position.z);

  updateBugs(cfg);
  updatePedestrians();
  updateTickets();
  updateRobots();
  updateAICams(cfg);
  updateExplosions();

  litters.forEach(l=>{l.mesh.rotation.y+=0.03;});

  if(logTimer>0){logTimer--;if(logTimer===0)document.getElementById('miniLog').style.opacity='0';}
  if(frameCount%30===0){updateHUD();updateActionButtons();}

  renderer.render(scene,camera);
}

// ============================================================
// START
// ============================================================
showModal(
  '🪲 LITTER BUG SPLAT!',
  '🌍',
  `MISSION: Clear ALL bugs AND ALL litter each level!\n\n` +
  `🗑️ Walk to litter → PICK UP LITTER\n` +
  `🪲 Carry litter + get close → SPLAT BUG\n` +
  `🎫 Face a bug → SHOOT TICKET (ranged)\n` +
  `🤖 ROBOTS → spider bots collect litter!\n` +
  `📷 AI CAMS → auto-shoot bugs (safe for pedestrians)\n` +
  `🚶 NEVER shoot pedestrians (−30 pts!)\n\n` +
  `Keyboard: WASD/Arrows=move, SPACE=shoot,\nE=splat, Q=pickup, R=robots, F=AI cam`,
  '🎮 Start Game!',
  ()=>{ initLevel(0); loop(); }
);
</script>
